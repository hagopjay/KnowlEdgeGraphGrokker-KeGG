<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simple Wowza Demo</title>
  <style>
    :root{--bg:#071026;--accent:#38bdf8;--muted:#9aa4b2}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--bg),#000);color:#e6eef8}
    .card{padding:20px;border-radius:12px;background:rgba(255,255,255,0.02);text-align:center;max-width:720px}
    h1{margin:0 0 8px;font-size:clamp(20px,4vw,28px)}
    p{margin:0 0 14px;color:var(--muted)}
    .orb{width:120px;height:120px;border-radius:50%;margin:18px auto;background:radial-gradient(circle at 30% 20%,#fff,var(--accent) 35%,#071026 80%);box-shadow:0 0 30px rgba(56,189,248,0.35)}
    .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    button{padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit;cursor:pointer}
    small{display:block;margin-top:12px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="card" role="main" aria-live="polite">
    <h1>Pages Wowza Demo</h1>
    <p>enabled via GitHub Pages</p>

    <div class="orb" id="orb" aria-hidden="true"></div>

    <div class="controls">
      <button id="rand">Randomize</button>
      <button id="reset">Reset</button>
      <button id="copy">Copy HTML</button>
    </div>

    <small id="status">Press Space to randomize</small>
  </main>

  <script>
    // Minimal interactive behavior, no external libs
    const orb = document.getElementById('orb');
    const rand = document.getElementById('rand');
    const reset = document.getElementById('reset');
    const copy = document.getElementById('copy');
    const status = document.getElementById('status');

    function setGlow(size, color) {
      orb.style.boxShadow = `0 0 ${size}px ${color}, 0 0 ${Math.round(size*1.6)}px rgba(0,0,0,0.25)`;
      orb.style.transform = `scale(${1 + size/300})`;
    }

    rand.addEventListener('click', () => {
      const size = Math.floor(Math.random()*60) + 20;
      const hue = Math.floor(Math.random()*360);
      setGlow(size, `hsla(${hue},85%,60%,0.6)`);
      status.textContent = 'Randomized';
    });

    reset.addEventListener('click', () => {
      setGlow(30, 'rgba(56,189,248,0.35)');
      orb.style.transform = 'scale(1)';
      status.textContent = 'Reset';
    });

    copy.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(document.documentElement.outerHTML);
        status.textContent = 'HTML copied to clipboard';
      } catch {
        status.textContent = 'Copy failed';
      }
    });

    // keyboard shortcut
    window.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); rand.click(); }
    });

    // initial state
    setGlow(30, 'rgba(56,189,248,0.35)');
  </script>
</body>
</html>
